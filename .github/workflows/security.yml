name: Security Guard (SAST & SCA)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Semgrep: Auditoría de código, secretos y Dockerfile
      - name: Semgrep Analysis
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/dockerfile
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }} # Opcional

      # Snyk: Escaneo de librerías (pom.xml)
      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      # Paso 2: Ejecutar el comando usando el CLI instalado
      - name: Snyk Open Source Analysis
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Aquí usamos 'run' sin 'uses'
        run: snyk test --severity-threshold=high --skip-unresolved
